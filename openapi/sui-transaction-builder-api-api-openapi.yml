components:
  schemas:
    ObjectDigest:
      $ref: '#/components/schemas/Digest'
    Base58:
      type: string
    Digest:
      description: A representation of a 32 byte digest
      allOf:
      - $ref: '#/components/schemas/Base58'
    InputObjectKind:
      oneOf:
      - type: object
        required:
        - MovePackage
        properties:
          MovePackage:
            $ref: '#/components/schemas/ObjectID'
        additionalProperties: false
      - type: object
        required:
        - ImmOrOwnedMoveObject
        properties:
          ImmOrOwnedMoveObject:
            $ref: '#/components/schemas/ObjectRef'
        additionalProperties: false
      - type: object
        required:
        - SharedMoveObject
        properties:
          SharedMoveObject:
            type: object
            required:
            - id
            - initial_shared_version
            properties:
              id:
                $ref: '#/components/schemas/ObjectID'
              initial_shared_version:
                $ref: '#/components/schemas/SequenceNumber2'
              mutable:
                default: true
                type: boolean
        additionalProperties: false
    ObjectRef:
      type: object
      required:
      - digest
      - objectId
      - version
      properties:
        digest:
          description: Base64 string representing the object digest
          allOf:
          - $ref: '#/components/schemas/ObjectDigest'
        objectId:
          description: Hex code as string representing the object id
          allOf:
          - $ref: '#/components/schemas/ObjectID'
        version:
          description: Object version.
          allOf:
          - $ref: '#/components/schemas/SequenceNumber'
    TransactionBlockBytes:
      type: object
      required:
      - gas
      - inputObjects
      - txBytes
      properties:
        gas:
          description: the gas objects to be used
          type: array
          items:
            $ref: '#/components/schemas/ObjectRef'
        inputObjects:
          description: objects to be used in this transaction
          type: array
          items:
            $ref: '#/components/schemas/InputObjectKind'
        txBytes:
          description: BCS serialized transaction data bytes without its type tag, as base-64 encoded string.
          allOf:
          - $ref: '#/components/schemas/Base64'
    BigInt_for_uint64:
      type: string
    SequenceNumber2:
      $ref: '#/components/schemas/BigInt_for_uint64'
    Hex:
      description: Hex string encoding.
      type: string
    ObjectID:
      $ref: '#/components/schemas/Hex'
    Base64:
      description: Base64 encoding
      type: string
    SequenceNumber:
      type: integer
      format: uint64
      minimum: 0.0
