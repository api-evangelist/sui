name: Sui
description: >
  Sui is a next-generation Move-based blockchain developed by Mysten Labs,
  designed for high throughput, low latency, and an asset-oriented programming
  model. It provides gRPC, GraphQL, and legacy JSON-RPC interfaces for querying
  objects, transactions, checkpoints, events, and balances on the Sui network.
  The gRPC API is the current recommended interface, replacing the deprecated
  JSON-RPC, while GraphQL RPC offers flexible reads for frontends and dashboards.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/sui/refs/heads/main/apis.yml
version: "0.19"
created: "2026-06-13"
modified: "2026-06-13"
tags:
  - Blockchain
  - Move
  - Web3
  - Cryptocurrency
  - Smart Contracts
apis:
  - name: Sui gRPC API
    description: >
      A generally available, type-safe full node API that replaces JSON-RPC on
      Sui full nodes. Provides low-latency point lookups, transaction
      submission, transaction simulation, and streaming subscriptions via
      SubscribeCheckpoints. Services include LedgerService, StateService,
      TransactionExecutionService, MovePackageService, NameService, and
      SignatureVerificationService.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.sui.io/concepts/data-access/grpc-overview
    baseURL: https://fullnode.mainnet.sui.io:443
    tags:
      - gRPC
      - Blockchain
      - Transactions
      - Objects
      - Checkpoints
    properties:
      - type: Documentation
        url: https://docs.sui.io/references/fullnode-protocol
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/sui/refs/heads/main/openapi.yml
    contact:
      - FN: Sui Developer Community
        url: https://discord.gg/sui
        email: ""

  - name: Sui GraphQL RPC
    description: >
      A generally available RPC service for flexible reads, transaction
      submission, and simulation backed by the Sui General-Purpose Indexer,
      Consistent Store, full nodes, and Archival Service. Best suited for
      frontends, dashboards, and nested queries combining multiple data types.
      Supports queries for addresses, objects, transactions, checkpoints, events,
      epochs, and coin metadata.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.sui.io/references/sui-graphql
    baseURL: https://sui-mainnet.mystenlabs.com/graphql
    tags:
      - GraphQL
      - Blockchain
      - Indexer
      - Objects
      - Transactions
    properties:
      - type: Documentation
        url: https://docs.sui.io/references/sui-graphql
      - type: GraphQL
        url: https://sui-mainnet.mystenlabs.com/graphql
    contact:
      - FN: Sui Developer Community
        url: https://discord.gg/sui
        email: ""

  - name: Sui JSON-RPC API (Deprecated)
    description: >
      The legacy JSON-RPC API for interacting with Sui full nodes, providing
      methods for querying objects, transactions, checkpoints, events, balances,
      and coin metadata. This interface is deprecated and will be decommissioned
      on July 31, 2026. Developers should migrate to the gRPC or GraphQL RPC
      APIs. The public endpoint is rate-limited to 100 requests per 30 seconds.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.sui.io/sui-api-ref
    baseURL: https://fullnode.mainnet.sui.io:443
    tags:
      - JSON-RPC
      - Blockchain
      - Deprecated
      - Objects
      - Transactions
    properties:
      - type: Documentation
        url: https://docs.sui.io/sui-api-ref
    contact:
      - FN: Sui Developer Community
        url: https://discord.gg/sui
        email: ""

